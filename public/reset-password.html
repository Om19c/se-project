<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediCare - Reset Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="auth-wrapper">
    <div class="fade-in w-100 d-flex justify-content-center px-3">
      <div class="auth-card">
        <div class="text-center mb-4">
          <svg viewBox="0 0 24 24" fill="#0d6efd" width="55" height="55" class="mb-3">
            <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/>
          </svg>
          <h3 class="fw-bold text-dark">New Password</h3>
          <p class="text-muted small">Enter your new password below.</p>
        </div>
        
        <div id="alertContainer"></div>

        <form id="resetPasswordForm">
          <div class="mb-3">
            <label class="form-label text-dark fw-bold small ms-1">New Password</label>
            <input type="password" class="form-control premium-input" id="newPassword" placeholder="••••••••" required>
          </div>
          <div class="mb-4">
            <label class="form-label text-dark fw-bold small ms-1">Confirm Password</label>
            <input type="password" class="form-control premium-input" id="confirmPassword" placeholder="••••••••" required>
          </div>
          <button type="submit" class="premium-btn w-100 py-2">Reset Password</button>
        </form>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
