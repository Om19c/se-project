<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediCare - Forgot Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="auth-wrapper">
    <div class="fade-in w-100 d-flex justify-content-center px-3">
      <div class="auth-card">
        <div class="text-center mb-4">
          <svg viewBox="0 0 24 24" fill="#0d6efd" width="55" height="55" class="mb-3">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
          </svg>
          <h3 class="fw-bold text-dark">Reset Password</h3>
          <p class="text-muted small">Enter your email address to receive a password reset link.</p>
        </div>
        
        <div id="alertContainer"></div>

        <form id="forgotPasswordForm">
          <div class="mb-4">
            <label class="form-label text-dark fw-bold small ms-1">Email Address</label>
            <input type="email" class="form-control premium-input" id="email" placeholder="john@example.com" required>
          </div>
          <button type="submit" class="premium-btn w-100 py-2">Get Reset Link</button>
        </form>
        
        <div class="text-center mt-4">
          <p class="mb-0 text-muted small"><a href="login.html" class="custom-link text-decoration-none">← Back to Login</a></p>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
